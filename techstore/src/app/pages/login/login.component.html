<div class="page auth-page">
  <div class="auth-card panel">
    <h1>{{ modoRegistro ? 'Crear cuenta' : 'Iniciar sesión' }}</h1>
    <p class="auth-subtitle">{{ modoRegistro ? 'Regístrate para acceder a checkout y más' : 'Accede a tu cuenta TechStore' }}</p>

    <form [formGroup]="loginForm" (ngSubmit)="enviar()">
      @if (modoRegistro) {
        <div class="form-group">
          <label for="nombre">Nombre</label>
          <input id="nombre" type="text" class="form-control" formControlName="nombre" />
        </div>
      }

      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" class="form-control" formControlName="email" placeholder="correo@ejemplo.com" />
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input id="password" type="password" class="form-control" formControlName="password" />
      </div>

      <button type="submit" class="btn btn-primary" style="width:100%">
        {{ modoRegistro ? 'Registrarse' : 'Iniciar sesión' }}
      </button>
    </form>

    <p class="auth-toggle">
      <button type="button" class="btn btn-ghost btn-sm" (click)="toggleModo()">
        {{ modoRegistro ? '¿Ya tienes cuenta? Inicia sesión' : '¿No tienes cuenta? Regístrate' }}
      </button>
    </p>
  </div>
</div>
